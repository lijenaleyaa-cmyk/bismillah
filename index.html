<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎂</title>
    
    <style>
        /* CSS: Mengatur Tampilan */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card {
            width: 85%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: muncul 1s ease-out;
        }

        @keyframes muncul {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ff4d6d;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
        }

        h1 {
            color: #ff4d6d;
            font-size: 26px;
            margin: 10px 0;
        }

        p {
            color: #555;
            font-size: 16px;
            line-height: 1.5;
        }

        .btn-surprise {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: 0.3s;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Variasi confetti sederhana */
        #confetti {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <audio id="myAudio">
        <source src="https://drive.google.com/file/d/1PFE4PWLtE0SggKy4Dzt2nQkHa7jgCzVM/view?usp=drivesdk" type="audio/mpeg">
    </audio>

    <canvas id="confetti"></canvas>

    <div class="card">
        <img src="https://drive.google.com/file/d/1yNteqOSM9jB6Nwt6WdJVCv17exkCORTo/view?usp=drivesdk" alt="Birthday Person" class="profile-img" onerror="this.src='https://via.placeholder.com/150?text=Foto+Ultah'">
        
        <h1>Happy Birthday! ✨</h1>
        <p>Semoga di usiamu yang baru ini, setiap langkahmu dipenuhi keberkahan, tawamu selalu renyah, dan impianmu jadi nyata.</p>
        
        <button class="btn-surprise" onclick="startSurprise()">Klik Kejutan & Musik 🎁</button>
    </div>

    <script>
        /* JS: Logika Interaksi */
        function startSurprise() {
            // Putar Musik
            var audio = document.getElementById("myAudio");
            audio.play();

            // Pesan Alert
            alert("HBD! 🎉 Wish you all the best!");

            // Efek Confetti Sederhana (Hujan warna-warni)
            let canvas = document.getElementById('confetti');
            let ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let pieces = [];
            for (let i = 0; i < 100; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    color: "rgb(" + Math.floor(Math.random()*256) + "," + Math.floor(Math.random()*256) + "," + Math.floor(Math.random()*256) + ")",
                    size: Math.random() * 10 + 5,
                    speed: Math.random() * 3 + 2
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                pieces.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                    p.y += p.speed;
                    if (p.y > canvas.height) p.y = -20;
                });
                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>

</body>
</html>
